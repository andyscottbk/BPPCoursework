AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BPM Frontend Application Infrastructure - ECS Fargate Service and Task Definition.
  Provisions the application layer only. Core network infrastructure (VPC, subnets,
  ALB, security groups) is managed separately as foundation infrastructure.
  Deployed by the CI/CD pipeline on every push to main.

Parameters:
  ImageUri:
    Type: String
    Description: Full ECR image URI including tag (e.g. 525125475337.dkr.ecr.eu-west-2.amazonaws.com/bpm-frontend:abc1234)

  AppEnv:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]
    Description: Deployment environment

  AppVersion:
    Type: String
    Default: '1.0.0'
    Description: Application version string for health check response

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: Number of ECS task instances to run

  # --- Existing Foundation Infrastructure References ---
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0d94945d4db8c3926
    Description: Existing BPM VPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0b65a630428f5da8e
    Description: bpm-subnet-private-app-2a

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0fd9c6ae9095f8944
    Description: bpm-subnet-private-app-2b

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-0b74e8a5cf6fc7c04
    Description: bpm-ecs-sg

  TargetGroupArn:
    Type: String
    Default: arn:aws:elasticloadbalancing:eu-west-2:525125475337:targetgroup/bpm-frontend-tg/be0941bb04e8eab1
    Description: ALB Target Group for bpm-frontend

  TaskExecutionRoleArn:
    Type: String
    Default: arn:aws:iam::525125475337:role/BPMAppECSTaskExecutionRole
    Description: IAM role for ECS task execution (pull images, write logs)

  TaskRoleArn:
    Type: String
    Default: arn:aws:iam::525125475337:role/BPMAppECSTaskExecutionRole
    Description: IAM role for the running task (Secrets Manager read access)

Resources:

  # --- CloudWatch Log Group ---
  # Centralised logging. 30-day retention balances audit requirements with cost.
  # Log Group created before the task definition to prevent race condition.
  BPMFrontendLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: /ecs/bpm-frontend
      RetentionInDays: 30

  # --- ECS Task Definition ---
  # Runs as non-root (enforced in Dockerfile). Secrets pulled from
  # AWS Secrets Manager at runtime - never stored in environment variables.
  BPMFrontendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn: BPMFrontendLogGroup
    Properties:
      Family: bpm-frontend-task
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      ContainerDefinitions:
        - Name: bpm-frontend-container
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          Essential: true
          Environment:
            - Name: APP_ENV
              Value: !Ref AppEnv
            - Name: APP_VERSION
              Value: !Ref AppVersion
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/bpm-frontend
              awslogs-region: eu-west-2
              awslogs-stream-prefix: ecs
          # Health check via curl to Nginx which proxies to Flask /health
          # curl is installed in the Dockerfile for this purpose
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:80/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 15
          ReadonlyRootFilesystem: false
          Privileged: false

  # --- ECS Service ---
  # Private subnets only - never directly internet-facing.
  # ALB handles all public traffic and TLS termination.
  BPMFrontendService:
    Type: AWS::ECS::Service
    DependsOn: BPMFrontendTaskDefinition
    Properties:
      ServiceName: bpm-frontend
      Cluster: bpm-cluster
      TaskDefinition: !Ref BPMFrontendTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: bpm-frontend-container
          ContainerPort: 80
          TargetGroupArn: !Ref TargetGroupArn
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      HealthCheckGracePeriodSeconds: 30

Outputs:
  ServiceName:
    Description: ECS Service Name
    Value: !GetAtt BPMFrontendService.Name

  TaskDefinitionArn:
    Description: Task Definition ARN
    Value: !Ref BPMFrontendTaskDefinition

  LogGroupName:
    Description: CloudWatch Log Group
    Value: !Ref BPMFrontendLogGroup
