name: BPM CI/CD Pipeline

# Triggers on push and pull requests to main.
# Build/deploy jobs only run on push (not PRs) to prevent
# deploying unreviewed code - important for MNPI compliance.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: bpm-frontend
  ECS_CLUSTER: bpm-cluster
  ECS_SERVICE: bpm-frontend
  STACK_NAME: bpm-frontend-stack

jobs:

  # -------------------------------------------------------
  # JOB 1: REACT FRONTEND TESTS
  # Runs Vitest unit tests for the React application.
  # Tests component rendering and API integration behaviour.
  # -------------------------------------------------------
  frontend-tests:
    name: React Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run React tests
        working-directory: frontend
        run: npm test

  # -------------------------------------------------------
  # JOB 2: PYTHON API UNIT TESTS
  # Validates Flask API endpoints and security behaviour.
  # Includes coverage reporting.
  # -------------------------------------------------------
  backend-tests:
    name: Python API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest app/tests/test_unit.py \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: coverage.xml

  # -------------------------------------------------------
  # JOB 3: SECURITY SCANNING
  # Scans Python dependencies for known CVEs using pip-audit.
  # Mandatory gate for MNPI-handling applications in a
  # regulated financial environment.
  # -------------------------------------------------------
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan Python dependencies for CVEs
        run: pip-audit -r app/requirements.txt

      - name: Scan npm dependencies for vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high

  # -------------------------------------------------------
  # JOB 4: STATIC CODE ANALYSIS (SAST)
  # GitHub CodeQL scans both Python and JavaScript source.
  # Equivalent to SonarQube - catches security vulnerabilities
  # before they reach a build.
  # -------------------------------------------------------
  code-quality:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # -------------------------------------------------------
  # JOB 5: BUILD & PUSH DOCKER IMAGE
  # Only runs on push to main after all tests pass.
  # Multi-stage build: Node (React) -> Python/Nginx production.
  # Image tagged with commit SHA for full traceability.
  # -------------------------------------------------------
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, security-scan, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Scan container image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  # -------------------------------------------------------
  # JOB 6: DEPLOY INFRASTRUCTURE (IaC)
  # Runs CloudFormation deploy to update the ECS task
  # definition with the new image URI. Uses --no-fail-on-empty-changeset
  # so unchanged infrastructure does not fail the pipeline.
  # -------------------------------------------------------
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation.yml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              ImageUri=${{ needs.build-and-push.outputs.image }} \
              AppEnv=production \
              AppVersion=${{ github.sha }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Verify stack is in a healthy state
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text)
          echo "Stack status: $STATUS"
          if [[ "$STATUS" != *"COMPLETE"* ]]; then
            echo "Stack is not in a healthy state: $STATUS"
            exit 1
          fi

  # -------------------------------------------------------
  # JOB 7: DEPLOY TO ECS
  # Forces a new deployment using the updated task definition.
  # Waits for the service to stabilise before completing -
  # ensures failed deployments are caught in the pipeline.
  # -------------------------------------------------------
  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Confirm running task count
        run: |
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount}'
