worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Hide Nginx version - reduces information leakage
    server_tokens off;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html;

        # Security headers - mandatory for MNPI-handling applications
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

        # Proxy API and health endpoints to Flask backend
        location /health {
            proxy_pass http://127.0.0.1:5000/health;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # React app - all other routes served from static build
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
